name: Multi-Platform Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        # Define the target platforms
        include:
          - os: windows-latest
            rid: win-x64
            suffix: Win64
          - os: ubuntu-latest
            rid: linux-x64
            suffix: Linux-x64

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Publish
      # We enable ReadyToRun only on the native OS for that RID
      run: >
        dotnet publish WarframeMarketTracker.csproj 
        -c Release 
        -r ${{ matrix.rid }} 
        --self-contained false 
        -p:PublishSingleFile=false 
        -p:PublishReadyToRun=true 
        -o ./publish-${{ matrix.rid }}

    - name: Zip Release Folder (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: Compress-Archive -Path ./publish-${{ matrix.rid }}/* -DestinationPath ./WarframeMarketTracker_${{ matrix.suffix }}.zip

    - name: Tar Release Folder (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: tar -czvf WarframeMarketTracker_${{ matrix.suffix }}.tar.gz -C ./publish-${{ matrix.rid }} .

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          WarframeMarketTracker_Win64.zip
          WarframeMarketTracker_Linux-x64.tar.gz
        name: Version ${{ github.ref_name }}
        body: |
          Multi-platform build for Version ${{ github.ref_name }}
          Requires .NET 10 Runtime installed on the host system.
        # This 'append_body' ensures parallel jobs don't overwrite each other
        append_body: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}